<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Versus — DACI Chart</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: #f5f4f0; color: #111827; min-height: 100vh; }
  .page { max-width: 860px; margin: 0 auto; padding: 32px 20px 60px; }
  .page-title { font-size: 28px; font-weight: 700; color: #111827; margin-bottom: 4px; }
  .page-sub { font-size: 13px; color: #6b7280; margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid #e5e7eb; }
  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 28px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #6b7280; }
  .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
  .badge-D  { background: #FCE7F3; color: #9D174D; }
  .badge-A  { background: #DBEAFE; color: #1E40AF; }
  .badge-C  { background: #D1FAE5; color: #065F46; }
  .badge-I  { background: #FEF3C7; color: #92400E; }
  .badge-IA { background: #EDE9FE; color: #4C1D95; }
  .badge-IC { background: #FEF9C3; color: #713F12; }
  .badge-DA { background: #FDF2F8; color: #831843; }
  .badge-DCAI { background: #F3F4F6; color: #374151; }
  .nav { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
  .nav-btn { font-size: 12px; font-weight: 500; padding: 6px 14px; border-radius: 8px; border: 1px solid #d1d5db; background: #fff; color: #6b7280; cursor: pointer; transition: all 0.15s; }
  .nav-btn:hover { background: #f3f4f6; color: #111827; }
  .nav-btn.active { background: #1D4ED8; border-color: #1D4ED8; color: #fff; }
  .panel { display: none; }
  .panel.active { display: block; }
  .panel-title { font-size: 18px; font-weight: 700; color: #111827; margin-bottom: 4px; }
  .panel-desc { font-size: 13px; color: #6b7280; line-height: 1.6; margin-bottom: 14px; }
  .note-box { background: #eff6ff; border-left: 3px solid #1D4ED8; border-radius: 0 8px 8px 0; padding: 10px 14px; font-size: 13px; color: #374151; line-height: 1.6; margin-bottom: 16px; font-style: italic; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; background: #fff; border-radius: 10px; overflow: hidden; border: 1px solid #e5e7eb; }
  th { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #1D4ED8; background: #eff6ff; padding: 9px 12px; text-align: left; border-bottom: 1px solid #e5e7eb; }
  th:nth-child(2) { width: 11%; text-align: center; }
  th:first-child { width: 22%; }
  td { padding: 11px 12px; border-bottom: 1px solid #f3f4f6; vertical-align: top; color: #111827; line-height: 1.55; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f9fafb; }
  td:nth-child(2) { text-align: center; }
  .role-name { font-weight: 600; font-size: 13px; color: #111827; }
  .role-person { font-size: 11px; color: #9ca3af; margin-top: 2px; }
  .ov-table th { font-size: 9px; text-align: center; }
  .ov-table th:first-child { text-align: left; width: 20%; }
  .ov-table td { text-align: center; font-size: 12px; }
  .ov-table td:first-child { text-align: left; }
  .ov-role { font-size: 10px; color: #9ca3af; }
</style>
</head>
<body>
<div class="page">
  <div class="page-title">Versus — DACI Chart</div>
  <div class="page-sub">Who drives, who approves, who contributes, who is informed — across every key responsibility area.</div>
  <div class="legend">
    <div class="legend-item"><span class="badge badge-D">D</span> Driver — steers the process</div>
    <div class="legend-item"><span class="badge badge-A">A</span> Approver — final authority</div>
    <div class="legend-item"><span class="badge badge-C">C</span> Contributor — input, no vote</div>
    <div class="legend-item"><span class="badge badge-I">I</span> Informed — kept updated</div>
  </div>
  <div class="nav" id="nav"></div>
  <div id="panels"></div>
</div>

<script>
const badgeMap = {
  "D":"badge-D","A":"badge-A","C":"badge-C","I":"badge-I",
  "I/A":"badge-IA","I/C":"badge-IC","D/C/A/I":"badge-DCAI"
};

const sections = [
  {
    id:"overview", label:"Overview", isOverview:true,
    title:"Full DACI map — all sections",
    desc:"Scan across all eight responsibility areas. Click any section tab for the working detail behind each assignment.",
    note:null,
    cols:["Production","Financial","Resourcing","Team","Project setup","Systems","Comms","Post-delivery"],
    rows:[
      { role:"MD / DOCO",          person:"Kathryn Henderson", badges:["A","A","C","A","C","D","A","A"] },
      { role:"Head of Production", person:"",                  badges:["D","D","D","D","D","C","D","D"] },
      { role:"CEO",                person:"Justin Barnes",     badges:["I","A","I/A","I","I","I","I","I"] },
      { role:"President",          person:"Rob Meyers",        badges:["I","A","D/C/A/I","I","C","I","I","C"] },
      { role:"Production EP Team", person:"Kevin + open role", badges:["C","C","C","I","D","I","C","C"] },
      { role:"Finance / CFO",      person:"Samantha / Alex",   badges:["I","A","I/C","I","I","C","C","I"] },
    ]
  },
  {
    id:"s1", label:"1. Production oversight",
    title:"Production oversight & project lifecycle",
    desc:"Full visibility across every active job — budget health, timelines, and producer day-to-day activity.",
    note:"HOP drives this entirely — gathering status, flagging risks, keeping every project moving. Kathryn approves any significant intervention or course-correction. Leadership stays informed, not involved.",
    rows:[
      ["MD / DOCO","Kathryn Henderson","A","Approves any significant course-corrections, escalations, or structural changes to how a project is running. Not in the day-to-day."],
      ["Head of Production","","D","Drives full project oversight. Knows the health of every job, surfaces risks early, and ensures nothing falls through. Brings decisions to Kathryn when approval is needed."],
      ["CEO","Justin Barnes","I","Informed of major risks, wins, or anything with company-level impact."],
      ["President","Rob Meyers","I","Informed of project status as it relates to client relationships and studio trajectory."],
      ["Production EP Team","Kevin + open role","C","Contributors on their active projects. HOP pulls them in when a project needs client-side intervention or creative course-correction."],
      ["Finance / CFO","Samantha / Alex","I","Informed of project health as it affects financial forecasting and reconciliation."],
    ]
  },
  {
    id:"s2", label:"2. Financial oversight",
    title:"Financial oversight & planning",
    desc:"Budget tracking, Timmy, job projections, weekly finance syncs, and timesheet approval.",
    note:"HOP drives the day-to-day financial engine — every input, every timesheet, every projection. Kathryn, Finance, and CEO are all Approvers because financial decisions touch company health.",
    rows:[
      ["MD / DOCO","Kathryn Henderson","A","Approves operational financial decisions — scope changes, margin calls, resourcing cost increases. Escalates company-level concerns to CEO and Finance."],
      ["Head of Production","","D","Drives all financial tracking: Timmy accuracy, timesheet approval, budget projections. Leads weekly finance sync. Surfaces risks with data, not just concerns."],
      ["CEO","Justin Barnes","A","Approver on major financial decisions with company-level impact. Not in weekly financial operations."],
      ["President","Rob Meyers","A","Approves decisions that affect studio profitability and growth trajectory."],
      ["Production EP Team","Kevin + open role","C","Contributors on bid budgets and scope decisions for their projects. Informed of financial health once projects are running."],
      ["Finance / CFO","Samantha / Alex","A","Approves financial reporting integrity and compliance. Partners with HOP weekly to validate and reconcile."],
    ]
  },
  {
    id:"s3", label:"3. Resourcing",
    title:"Resourcing & workforce management",
    desc:"Staffing strategy, freelance lifecycle, hiring forecasts, and coverage planning.",
    note:"HOP drives staffing execution and brings decisions to Justin for approval, looping in MD, President, and Finance as needed. Rob drives full-time hire decisions and has broad oversight across this area.",
    rows:[
      ["MD / DOCO","Kathryn Henderson","C","Consults on resourcing plans, full-time hire decisions, and significant freelance spend. Has the studio-wide view to evaluate trade-offs HOP may not see."],
      ["Head of Production","","D","Drives all resourcing: plans, forecasts, freelance database, holds, bookings, and coverage. Brings decisions to Justin for approval. Loops in MD, President, and Finance as needed."],
      ["CEO","Justin Barnes","I/A","Approves resourcing and job plans from HOP. Informed of significant headcount or structural staffing changes."],
      ["President","Rob Meyers","D/C/A/I","Contributor when resourcing decisions relate to pipeline capacity or growth opportunities. Drives full-time hire decisions and significant freelance spend. Has studio-wide view to evaluate trade-offs."],
      ["Production EP Team","Kevin + open role","C","Contributors on project-specific staffing needs and crew preferences. Input sought during project setup."],
      ["Finance / CFO","Samantha / Alex","I/C","Informed of freelance spend and headcount changes as they affect labor cost forecasts."],
    ]
  },
  {
    id:"s4", label:"4. Team leadership",
    title:"Team leadership & standards",
    desc:"Managing producers, 1:1s, onboarding, and setting standards for communication and job execution.",
    note:"HOP fully drives this. Kathryn approves significant personnel decisions. Leadership is informed — not in the team's day-to-day.",
    rows:[
      ["MD / DOCO","Kathryn Henderson","A","Approves significant personnel decisions: performance issues, role changes, dismissals. Manages HOP's own performance and development directly."],
      ["Head of Production","","D","Drives all team management: 1:1s, standards, onboarding, training, and daily producer support. Accountable for the team performing at the Versus standard."],
      ["CEO","Justin Barnes","I","Informed of significant team changes or culture concerns with company-level impact."],
      ["President","Rob Meyers","I","Informed of team structure changes that affect studio delivery capacity."],
      ["Production EP Team","Kevin + open role","I","Informed of producer changes that affect their active projects."],
      ["Finance / CFO","Samantha / Alex","I","Informed of headcount changes as they relate to payroll and labor costs."],
    ]
  },
  {
    id:"s5", label:"5. Project setup",
    title:"Bidding, kickoff & project setup",
    desc:"Pre-award alignment, EP-to-HOP handoff, kickoffs, and configuring projects in all studio systems.",
    note:"Production EPs drive pre-award. HOP drives post-award setup and kickoff. This handoff is a documented moment — not a drift.",
    rows:[
      ["MD / DOCO","Kathryn Henderson","C","Contributor on significant scope, feasibility, or resourcing questions before award. Informed when major projects kick off."],
      ["Head of Production","","D","Drives all post-award setup: systems, team assignment, internal kickoff, communication protocols. Accountable for nothing being missed at project start."],
      ["CEO","Justin Barnes","I","Informed of major project awards. Involved in pre-award creative direction — not in operational setup."],
      ["President","Rob Meyers","C","Contributor pre-award on major opportunities. Informed post-award once handoff to HOP is complete."],
      ["Production EP Team","Kevin + open role","D","Drives the pre-award process: bidding, scoping, client communication, and award. Hands the baton to HOP post-award. Co-driver with HOP through kickoff."],
      ["Finance / CFO","Samantha / Alex","I","Informed when projects are initialized in Timmy and budgets are live."],
    ]
  },
  {
    id:"s6", label:"6. Systems & workflow",
    title:"Systems, tools & workflow optimization",
    desc:"Render farm, artist software, AI tools, passwords, licenses, and larger workflow architecture.",
    note:"HOP drives maintenance — tracking costs, managing access, flagging needs. Kathryn drives the build layer — designing and deploying larger solutions. HOP flags the problem; DOCO architects the fix.",
    rows:[
      ["MD / DOCO","Kathryn Henderson","D","Drives larger systems builds, workflow architecture, and tech initiatives that are too complex for HOP given their production workload. Takes HOP's flags and turns them into solutions."],
      ["Head of Production","","C","Day-to-day operator and contributor. Drives maintenance and monitoring of what exists — software licenses, AI tool costs, passwords, render farm health, artist software needs. Flags problems to DOCO."],
      ["CEO","Justin Barnes","I","Informed of significant technology investments or infrastructure decisions with company-level cost or strategic impact."],
      ["President","Rob Meyers","I","Informed of systems changes that affect studio scalability or competitive positioning."],
      ["Production EP Team","Kevin + open role","I","Informed of workflow changes that affect how they interact with the production team."],
      ["Finance / CFO","Samantha / Alex","C","Contributor on systems that affect financial tracking, Timmy integrations, or cost reporting. Informed of workflow changes that affect how they interact with other teams."],
    ]
  },
  {
    id:"s7", label:"7. Comms cadence",
    title:"Meetings & communication cadence",
    desc:"Weekly production meetings, financial syncs, producer 1:1s, and keeping leadership informed without overhead.",
    note:"HOP designs and runs the communication rhythm. Kathryn approves the structure and sets the escalation standard — she wants to be informed without being in every meeting.",
    rows:[
      ["MD / DOCO","Kathryn Henderson","A","Approves communication structure and escalation protocols. Sets the standard for what reaches her and when. Wants to be informed, not overwhelmed."],
      ["Head of Production","","D","Drives all production communication: weekly meetings, resource check-ins, finance syncs, and producer 1:1s. Accountable for leadership always having current visibility."],
      ["CEO","Justin Barnes","I","Informed of material risks, major project wins, and anything affecting company direction."],
      ["President","Rob Meyers","I","Informed of project status and capacity at a level relevant to BD and growth."],
      ["Production EP Team","Kevin + open role","C","Contributors in the communication structure for their active projects. Participate in relevant syncs."],
      ["Finance / CFO","Samantha / Alex","C","Participate in weekly financial sync. Contributors on agenda and reporting format."],
    ]
  },
  {
    id:"s8", label:"8. Post-delivery",
    title:"Post-delivery & marketing support",
    desc:"Wrap documentation, asset organization, case study initiation, PR and social content workflows.",
    note:"HOP drives wrap and initiates the marketing pipeline. Kathryn approves what gets surfaced externally. Rob and the EP team are key contributors — they know the client relationship and what's approved for public use.",
    rows:[
      ["MD / DOCO","Kathryn Henderson","A","Approves what work gets positioned publicly. Informed of all project wraps and their status."],
      ["Head of Production","","D","Drives wrap documentation, final asset organization, and flags work for case study or PR pipeline. Accountable for no project going dark after delivery."],
      ["CEO","Justin Barnes","I","Informed when significant work is positioned publicly. Involved in high-level brand decisions around what Versus puts forward."],
      ["President","Rob Meyers","C","Contributor on what work gets surfaced for PR, awards, and social. His client and BD lens is essential here."],
      ["Production EP Team","Kevin + open role","C","Contributors on what the client has approved for public use. Own the relationship conversation around PR and follow-up opportunities."],
      ["Finance / CFO","Samantha / Alex","I","Informed when projects are fully reconciled and wrapped in Timmy."],
    ]
  },
];

const nav = document.getElementById('nav');
const panels = document.getElementById('panels');

sections.forEach(function(s, i) {
  var btn = document.createElement('button');
  btn.className = 'nav-btn' + (i===0?' active':'');
  btn.textContent = s.label;
  btn.onclick = function() {
    document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('active'); });
    document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
    btn.classList.add('active');
    document.getElementById('panel-'+s.id).classList.add('active');
  };
  nav.appendChild(btn);

  var panel = document.createElement('div');
  panel.className = 'panel' + (i===0?' active':'');
  panel.id = 'panel-'+s.id;

  var html = '<div class="panel-title">'+s.title+'</div><div class="panel-desc">'+s.desc+'</div>';
  if (s.note) html += '<div class="note-box">'+s.note+'</div>';

  if (s.isOverview) {
    html += '<table class="ov-table"><thead><tr><th>Role</th>';
    s.cols.forEach(function(c){ html += '<th>'+c+'</th>'; });
    html += '</tr></thead><tbody>';
    s.rows.forEach(function(row){
      html += '<tr><td><div class="role-name">'+row.role+'</div><div class="ov-role">'+row.person+'</div></td>';
      row.badges.forEach(function(b){
        var cls = badgeMap[b] || 'badge-I';
        html += '<td><span class="badge '+cls+'">'+b+'</span></td>';
      });
      html += '</tr>';
    });
    html += '</tbody></table>';
  } else {
    html += '<table><thead><tr><th>Role</th><th>DACI</th><th>What this means in practice</th></tr></thead><tbody>';
    s.rows.forEach(function(row){
      var cls = badgeMap[row[2]] || 'badge-I';
      html += '<tr><td><div class="role-name">'+row[0]+'</div><div class="role-person">'+row[1]+'</div></td>';
      html += '<td><span class="badge '+cls+'">'+row[2]+'</span></td>';
      html += '<td>'+row[3]+'</td></tr>';
    });
    html += '</tbody></table>';
  }

  panel.innerHTML = html;
  panels.appendChild(panel);
});
</script>
</body>
</html>
